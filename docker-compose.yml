version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: school-os-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school_os_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school-os-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: school-os-redis
    command: redis-server --requirepass redispassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - school-os-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  school-os-network:
    driver: bridge
